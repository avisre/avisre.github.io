    <text x="80" y="270" font-size="80" font-weight="800" letter-spacing="-1">Cross-Platform</text>
    <text x="80" y="360" font-size="80" font-weight="800" letter-spacing="-1" fill="url(#grad)">Full-Stack Developer</text>
    <text x="80" y="440" font-size="30" fill="#cbd5e1">React  ·  Node.js  ·  Flutter  ·  Android (Kotlin)  ·  On-Device AI</text>
    <text x="80" y="500" font-size="26" fill="#9aa7c2">4 products shipped in 6 months  ·  Open to remote contract</text>
    <text x="80" y="570" font-size="22" fill="#22d3ee">avisre.github.io</text>
